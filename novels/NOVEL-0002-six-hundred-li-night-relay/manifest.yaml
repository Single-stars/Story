premise:
  status: proposed
  logline: 一个冒用亡兄身份的女驿卒顾青禾，必须在七夜内送完一封由死去九年的父亲发出的六百里急递；每过一站，她都要戴上一张有禁令、有代价的傩面，直到发现自己才是被递送的活傩。
  theme_question: 一个人的身份与责任，究竟由官册、亲缘和别人给的脚色决定，还是由她愿意公开承担的选择决定？
  core_conflict: 顾青禾必须按时送递以避免驿站被遗忘，却逐渐发现急递正在把无名者的死亡债转移到她身上；她要在完成差事、救具体的人和保住自己的名字之间选择。
