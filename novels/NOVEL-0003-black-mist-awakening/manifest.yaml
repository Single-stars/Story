premise:
  status: proposed
  logline: 高三生温良十年间被迫在黑雾梦境里不断衰弱，直到一次梦中与真实界肉身融合后彻底留在荒芜的真实地球；他必须先在黑雾聚落里活下来，再找到回到梦境、拯救重要之人的方法，而他对世界的每一次新理解都可能改变现实本身。
  theme_question: 当你以为自己活在真实里时，究竟什么才算醒来，什么才算救回自己？
  core_conflict: 温良一边被现实的荒芜与失忆逼迫接受真实界，一边被梦境里仍然存在的亲友和情感牵引着回头；他想修复一切，但每一步都会让他更接近更大的真相，也更接近失去现有的自我。
