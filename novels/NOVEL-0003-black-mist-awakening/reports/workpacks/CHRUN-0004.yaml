resume_brief: >-
  CHRUN-0004 is the durable entry point for CHAPTER-0011. Wen Liang works the
  settlement fire line and learns the material cost of staying alive there.
  Keep the real-world labor visible, the pressure indirect, and the chapter
  focused on costed cooperation rather than explanation.
