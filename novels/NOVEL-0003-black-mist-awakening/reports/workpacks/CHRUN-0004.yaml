continuity_contract:
  world_state: >-
    Chapter 11 remains in the real/main world settlement and the fire-line
    accounting routine. Keep it visibly separate from the dream-layer hospital.
  capability_scope: >-
    Wen Liang can work, observe, ask, and notice; he cannot rewrite material
    conditions or erase the cost of living there.
  character_knowledge: >-
    Wen Liang knows he needs to be useful. Lin Zhao knows only the cost and
    risk he is willing to bear. Qin Juan knows where the numbers break.
  relationship_state: >-
    The real-world line shifts from shelter to collaboration; trust is still
    conditional and dependent on work done.
  foreshadowing_plan: >-
    Advance the cost, labor, and settlement pressure thread. Keep the gray-clad
    pressure indirect.
  motivation_gate: >-
    Every scene must show why Wen Liang stays, what work he does, and what it
    costs him if he refuses.
  concept_exposure_gate: >-
    New concepts appear as fuel, ledger, patrol, and material routine. Do not
    explain the wider structure.
  npc_independence_gate: >-
    Lin Zhao and Qin Juan each have separate cost and survival logic.
  cross_layer_state_gate: >-
    Track body fatigue, resources, and elapsed time across the settlement.
  reader_exposure:
    allowed:
      - The reader may see the settlement as a working system with real costs.
    forbidden:
      - Do not reveal organization truth or make the settlement a safe haven.

