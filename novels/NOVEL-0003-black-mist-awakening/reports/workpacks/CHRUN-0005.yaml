resume_brief: >-
  CHRUN-0005 is the durable entry point for CHAPTER-0012. Wen Liang learns to
  distinguish fire line, mist, patrol sound, and warning from Lin Zhao and Liu
  Popo. Keep the lesson practical and costed; do not turn it into a magic
  showcase or explanation dump.
