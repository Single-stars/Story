continuity_contract:
  world_state: >-
    Chapter 12 remains in the real/main world settlement and expands the
    hearing-and-response routine. Keep dream-layer hospital material offstage.
  capability_scope: >-
    Wen Liang may learn to distinguish sound, rhythm, and warning. He still
    cannot use mind-over-matter or produce proof by intention.
  character_knowledge: >-
    Wen Liang knows a little more about where danger lives. Lin Zhao and Liu
    Popo know what can be taught and what can only be lived through.
  relationship_state: >-
    Support becomes practical cooperation. Wen Liang is no longer only being
    protected; he is being trained to notice and act.
  foreshadowing_plan: >-
    Advance the hearing/reading-the-environment thread and keep organization
    pressure indirect.
  motivation_gate: >-
    Every lesson must have a visible trigger, an immediate goal, a risk, and a
    stopping condition.
  concept_exposure_gate: >-
    New concepts appear as sound, distance, and routine technique. Do not turn
    them into theory-first exposition.
  npc_independence_gate: >-
    Lin Zhao and Liu Popo each teach for their own reasons and costs.
  cross_layer_state_gate: >-
    Track fatigue, hearing, and resource changes across the lesson.
  reader_exposure:
    allowed:
      - The reader may see Wen Liang begin to handle real-world warning signs.
    forbidden:
      - Do not reveal organization truth or make the hearing skill supernatural beyond the established rule set.

