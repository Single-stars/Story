resume_brief: >-
  CHRUN-0003 is the durable entry point for CHAPTER-0010. Wen Liang stays in
  the dream-layer hospital, turns his crossing into a shared sequence with Nan
  Gong Yun'er, Chen An, and Gu Xiaoyu, and notices a gray-clad observer that
  pushes the line from private experience toward social pressure.
