continuity_contract:
  world_state: >-
    Chapter 10 remains in the dream-layer hospital. Keep the hospital,
    school-memory residue, and the emerging gray-clad pressure clearly
    separated from the real/world survival line.
  capability_scope: >-
    Wen Liang can record, compare, infer, and refuse to collapse his
    experience into a simple explanation. He cannot prove the crossing with
    physical evidence.
  character_knowledge: >-
    Wen Liang, Nan Gong Yun'er, Chen An, and Gu Xiaoyu each know only the
    pieces visible to them. The gray-clad figure is only a partial external
    signal.
  relationship_state: >-
    The hospital trio begins to function as a shared observation circle. Nan
    Gong Yun'er remains the lead observer; Chen An supplies ordinary support;
    Gu Xiaoyu supplies social lubrication and spacing.
  foreshadowing_plan: >-
    Advance the gray-clad external-pressure thread through observation, not
    explanation. Do not reveal full organization logic.
  motivation_gate: >-
    Every comparison, question, and record in this chapter must serve the
    immediate goal of turning Wen Liang's experience into usable sequence.
  concept_exposure_gate: >-
    New concepts appear as hospital hallways, paper, timing, shared notes, and
    an observed gray figure. Do not explain organization or route function.
  npc_independence_gate: >-
    Nan Gong Yun'er, Chen An, and Gu Xiaoyu each need their own reason to stay,
    look, ask, or deflect.
  cross_layer_state_gate: >-
    No cross-layer evidence survives as objective proof; track only the social
    consequences and the memory record.
  reader_exposure:
    allowed:
      - The reader may see the observation circle forming and the gray-clad clue entering the hospital line.
    forbidden:
      - Do not reveal full organization truth or make the gray-clad man a solved identity.

