continuity_contract:
  world_state: >-
    Chapter 7 begins in the real/main world at the old well and ends in the dream layer hospital. Keep both layers explicit.
  capability_scope: >-
    During this chapter, Wen Liang may traverse the old well using the established return route, but he may not stabilize cross-layer evidence or rewrite physical reality.
  character_knowledge: >-
    Wen Liang knows the crossing is dangerous, knows he wants to return to the dream layer, and knows that proof will likely fail. Liu Popo and Lin Zhao each know only their limited version of the well.
  relationship_state: >-
    Lin Zhao is cautious but not hostile; Liu Popo provides a narrow help line; Wen Liang remains dependent on their limited guidance.
  foreshadowing_plan: >-
    Plant the return-route danger and evidence failure. Do not reveal any organization-level truth. Do not repeat the hospital wake-up as a new hook; it is the destination, not the opening trick.
  motivation_gate: >-
    Wen Liang must have an immediate goal, risk, and stop condition while descending. If the route changes, he must have a visible reason.
  concept_exposure_gate: >-
    New concepts must appear as material traces: fire rope, well chain, the word "回梦", darkness, and body pain.
  npc_independence_gate: >-
    Lin Zhao and Liu Popo must each act from independent settlement goals and risks, not as convenient exposition devices.
  cross_layer_state_gate: >-
    Track body position, rope state, recording failure, and memory continuity across the crossing. No silent duplication of evidence.
  reader_exposure:
    allowed:
      - The reader may see the old well as a dangerous route and the hospital as the return destination.
      - The reader may see limited help from Lin Zhao and Liu Popo.
    forbidden:
      - Do not reveal high-level organization truth or make the well a stable public portal.

