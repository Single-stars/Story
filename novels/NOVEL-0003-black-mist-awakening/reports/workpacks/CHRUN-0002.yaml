resume_brief: >-
  CHRUN-0002 is the durable entry point for CHAPTER-0007. Wen Liang descends the old well with a fire rope, crosses back toward the dream layer, and wakes in the hospital with the crossing remaining unprovable. Use this workpack only for chapter 7 drafting; keep the dream layer and real/main layer explicit, avoid repeating the chapter-6 hospital wake-up as a new trick, and carry forward only the approved evidence-failure premise.
