resume_brief: >-
  This is the durable entry point for restructuring NOVEL-0003 volume 1. Before
  any rewrite or continuation, load this workpack plus the listed IDs. The next
  implementation should not polish the existing prose first. It should build a
  revised chapter/scene matrix, then create CHRUN records per chapter. Hard
  priorities: enforce ability timing, make each world visually unambiguous,
  delay organization exposure, add named social cast, slow Wen Liang/Nangong
  Yun'er, explain settlement survival through visible routines, and remove
  decorative clues that do not affect action or knowledge. Also load the
  character, world, scene, event, entry-map, and short-rule index decisions so later chapter work
  starts from the same readable memory stack.
