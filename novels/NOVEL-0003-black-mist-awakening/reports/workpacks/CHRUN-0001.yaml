continuity_contract:
  world_state: >-
    Every scene must name and render the current layer clearly. Dream world:
    prosperous, normal, daily school life. Real/main world: decayed, black-mist
    covered, materially harsh. Do not use vague "reality" wording when the
    reader needs layer orientation. Chapter 5's body encounter must be a
    wandering, living-corpse-like self whose footsteps have been heard, not a
    self sitting in a car.
  capability_scope: >-
    Author rule for revisions: before body-soul fusion, Wen Liang may perceive
    black mist, footsteps, memory anomalies, and emotional distortions, but may
    not stop pens, posters, lights, iron sheets, or change objects by thought.
    After fusion in the real/main world, he automatically clears nearby mist and
    can be noticed because of it, but still cannot reshape physical reality by
    intention. Only after knowingly entering the dream world may he make limited
    dream-rule changes. Existing RULE-0002 and early chapters conflict with this
    and require proposal/retcon handling before rewrite.
  character_knowledge: >-
    Characters may not speak or act from organization-level truth before they
    have a source. Wen Liang cannot ask about a special organization before
    learning such a thing exists. Early knowledge should come from observation,
    named local people, mistaken guesses, survival routines, and visible costs,
    not from author explanation.
  relationship_state: >-
    Wen Liang and Nangong Yun'er must slow down. Early dream-world school life
    needs normal social texture: roommates, classmates, desk mates, teachers,
    and named recurring minor characters. Any character with dialogue, repeated
    function, or likely future use needs a name, first-look detail, simple
    personality signal, and relationship position.
  foreshadowing_plan: >-
    Footsteps must point toward the wandering body/self and pay off through
    contact, fusion, and blackout. Hospital wake-up should not repeat across
    chapters as the same hook. Organization traces must remain low-level and
    indirect early; no advanced explanation, facility tour, or precise external
    handler should appear before its disclosure window.
  reader_exposure:
    allowed:
      - "Readers may see layer-specific evidence: prosperous dream school life or decayed black-mist real/main world."
      - Readers may see Wen Liang's automatic mist-clearing after fusion through local people's reactions.
      - Readers may see local survival details such as fire lines, patrol routines, resource limits, and mistaken explanations.
      - Readers may see named everyday classmates and settlement residents through action and conflict.
    forbidden:
      - Do not reveal high-level organization truth, facility logic, or handler knowledge in the early chapters.
      - Do not use unexplained decorative signs such as meaningless water mist patterns unless they change action, knowledge, relationship, or payoff.
      - Do not imply real/main world telekinesis or physical reality rewriting.
      - Do not make Nangong Yun'er a truth radar or emotional shortcut.
      - Do not rely on vague dream/real wording that leaves the reader unsure where the scene is.
  motivation_gate: >-
    Any ability test must name the immediate trigger, observable goal, hypothesis,
    tolerable risk, and stopping condition. If the protagonist has no reason to
    test an ability, render perception or failed action instead of a capability checklist.
  concept_exposure_gate: >-
    Introduce new concepts through shape, material, sound, trace, use, and other
    visible consequences. A name may be provisional only after a source exists;
    signs, labels, riddles, and narrator summaries must not reveal function or truth.
  npc_independence_gate: >-
    Every NPC who supplies information, access, protection, or a route must have
    an independent goal and pay or risk something. Character function belongs in
    the workpack, not in polished self-descriptive dialogue.
  cross_layer_state_gate: >-
    Track each cross-layer person's location, body state, item holder/location,
    and elapsed time from departure to arrival. Do not leave phones, bodies, or
    evidence duplicated or silently transferred.

