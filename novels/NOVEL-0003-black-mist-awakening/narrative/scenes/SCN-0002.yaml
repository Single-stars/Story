name: 旧井返程
summary: >-
  温良在真实界旧井前接受有限帮助，顺着火绳与井梯下行，完成一次危险返程。读者看到的是跨层动作、身体代价和无法被完整证明的返回，而不是稳定门户或解释性答案。
