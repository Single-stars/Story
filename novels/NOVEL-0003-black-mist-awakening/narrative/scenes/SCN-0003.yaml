name: 医院醒来
summary: >-
  温良从跨层返回后在梦境层医院醒来，面对护士、班主任、同学和南宫芸儿的追问，却没有任何可以独立证明真实经历的证据。读者看到的是证据失败和关系压力，而不是又一次重复性的病床钩子。
