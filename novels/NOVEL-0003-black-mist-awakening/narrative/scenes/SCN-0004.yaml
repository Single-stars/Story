name: 三个人的消息
summary: >-
  温良在医院病床上与南宫芸儿、陈安、古晓雨一起把跨层经历写成可复查的顺序，三人开始分工观察、提问和遮掩，病房由单人的秘密变成一张持续扩大的消息网。读者看到的是证据失败后的共同记录，以及走廊里灰衣外来者留下的轻微压力。
