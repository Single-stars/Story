entry_state: >-
  温良醒在医院，手边有记录本和一片写着“井醒着”的纸。南宫芸儿已经开始要求顺序，陈安负责现实支持，古晓雨负责把病房维持成不会立刻炸开的日常，所有人都知道这件事不能再只靠温良自己记。

structure:
  goal: 把跨层经历拆成可以重复检查的顺序与细节。
  conflict: 温良的记忆、众人的怀疑和医院的普通解释都在抢夺叙述权。
  turning_point: 南宫芸儿不再问“你是不是疯了”，而是改成“按顺序说，我记录”。
  crisis: 继续把话说成离散的怪事，只会让大家更容易把它当作胡话；但如果按细节记录，又意味着温良必须承认这不是能够立刻解释清楚的经历。
  climax: 温良把火线、旧井、林照、秦婉、刘婆婆、梁渡和小果按时间说出来，南宫芸儿开始写时间线。
  resolution: 病房从单人秘密变成三人消息网，古晓雨和陈安也被卷入观察与遮掩的分工。
  exit_hook: 南宫芸儿在走廊看见一个灰衣人，开始怀疑医院里也有看不见的外部压力。

exit_state: >-
  温良拥有一份更完整的纸面记录，南宫芸儿手里掌握了时间线和问题清单，陈安知道这不是单纯晕倒，古晓雨知道该先把气氛守住；走廊里的灰衣外来者让医院线开始出现新的外部压力。

