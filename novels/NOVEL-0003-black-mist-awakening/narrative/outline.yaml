objective:
  story_goal: "让温良在第一卷里完成从被动虚弱到主动寻找真相的转变，并把双界、权限和南宫芸儿的关系线立起来。"
  reader_promise: "校园轻松感、黑雾悬疑、双界反转、真实界探索、情绪推动的能力变化、第一卷闭环。"
  theme_question: "当梦境比现实更像救赎时，人该怎么确认自己真正醒来。"
  core_conflict: "温良想回到梦境找回重要的人，但真实界逼他接受新的生存法则，而梦境里的异常又不断证明他不能把一切当成幻觉。"
  ending_cost: "第一卷结束时，温良必须承认现实界不是梦境的附属，而是他必须主动面对的另一层真实；医院醒来只是阶段性恢复，不是问题解决。"
  success_criteria:
    - "校园前期自然，不像设定讲解"
    - "黑雾、脚步声和小异常有递进"
    - "真实界火光聚落的出现可信"
    - "温良的主动性逐步回升"
    - "第一卷在医院醒来处形成闭环"

structure:
  lenses:
    - scene-sequel
    - want-need-wound-lie
    - story-grid-five-commandments
  opening_promise: "第一眼是校园和黑雾的怪异回声，读者先跟着温良困惑，再慢慢意识到这不是普通梦。"
  first_major_turn: "温良在最后一次梦中与真实界肉身融合，永久留在真实界。"
  midpoint_change: "黑雾中出现火光聚落，温良第一次确认真实界并非无人之地。"
  lowest_point: "温良尝试回梦境失败，且不得不面对现实界的生存压力与失忆。"
  climax_choice: "他借助组织或诡异方法返回梦境，在真假之间做出一次有代价的选择。"
  resolution: "温良在医院醒来，暂时恢复正常生活，但真相已经无法再被完全压回去。"

