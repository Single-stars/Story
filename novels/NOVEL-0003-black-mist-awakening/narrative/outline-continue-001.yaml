risks:
  continuity:
    - "7-8 章必须严格承接旧井返程与医院取证失败，不能重新写成重复醒来。"
    - "校园线不能提前给出组织答案，必须维持低层观察。"
  pacing:
    - "若 9-12 章校园群像铺太长，会挤压真实界生活感。"
    - "若 15-20 章组织影子太早讲透，会破坏悬念。"
  genre_promise:
    - "双界反差必须持续有新信息，而不是反复解释同一套规则。"
  dependency:
    - "后续正式写作必须按 7-8 / 9-12 / 13-16 / 17-20 四批工作包执行。"

