objective:
  story_goal: "把温良从“被跨层拖拽的人”推进到“主动承担两界选择的人”，同时维持校园、医院、聚落三条日常线的具体感和代价感。"
  reader_promise: "继续给出双界反差、校园关系推进、真实界生存成本、旧井回梦代价和组织低层影子的持续悬念。"
  theme_question: "当你不能证明自己经历过的事情时，你还要不要为它负责？"
  core_conflict: "温良想把梦和现实重新分开并证明自己没有疯，但每次试图回避，都会把更深的代价和关系后果带回来。"
  ending_cost: "到第 20 章时，温良必须主动为下一次跨层行动付出明确代价，且南宫芸儿、陈安与真实界聚落都不再只是旁观者。"
  success_criteria:
    - "第 7-8 章完成旧井返程与医院醒来，且不重复前文钩子。"
    - "第 9-12 章保持校园群像推进，关系变化有可见压力。"
    - "第 13-16 章把真实界劳动、旧井规矩和证据失败具体化。"
    - "第 17-20 章把组织低层影子和主动选择门槛推出来。"

structure:
  lenses:
    - scene-sequel
    - want-need-wound-lie
    - story-grid-five-commandments
  opening_promise: "第 7 章继续从旧井进入未知下层，让返梦不再是恢复，而是新危险的开始。"
  first_major_turn: "温良从旧井重新进入梦境层医院，确认梦境层并不等于安全。"
  midpoint_change: "校园与医院的日常推进中，南宫芸儿、陈安与古晓雨的关系开始共同围拢温良，异常不再只是他的个人体验。"
  lowest_point: "温良试图用证据证明自己，结果再一次失败，只能承认他需要用行动而不是证据来承担经历。"
  climax_choice: "他决定主动准备下一次跨层行动，而不是等待异常再次把他拖过去。"
  resolution: "第 20 章结束时，温良已经能稳定调用两界经验来做选择，但代价、限制和人际后果都已明确。"

