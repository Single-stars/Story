schema_version: "0.1.0"
record_type: working_decision
id: DECISION-WORKING-020
owner:
  novel_id: NOVEL-0003
status: working
visibility: internal
canon_effect: proposal_only

summary: "维护《雾醒时分》人物职责、主动目标、方向性关系与知识边界；人物必须先作为独立行动者成立，再承担线索、感情或世界观功能。"

characters:
  - name: "温良"
    layer: "梦境开局；融合后进入真实世界"
    narrative_job: "以亲身选择连接两种小说质感，并在无法证明经历的前提下重新建立行动能力。"
    core_traits: ["曾经优秀", "长期虚弱", "敏感克制", "不愿拖累别人", "被逼到边缘后仍会救人"]
    active_goal: "先确认自己身处何处并活下来，再主动取得聚落容身资格、理解黑雾与寻找回到重要之人身边的可能。"
    agency_contract:
      - "主动观察聚落规则和火线，而不是等人讲解。"
      - "选择用劳动交换食物、信息和信任。"
      - "在风险明确时自行决定测试能力或救人，并承担暴露后果。"
      - "主动追问旧井与回程线索，但不能因此获得免费答案。"
    knowledge_boundary: "前期只知道自身感受和经历，不知道入梦计划、零号、系统、权限、灵魂训练体系或双界真相。"
    arc_direction: "优秀受瞩目 -> 长期衰弱沉没 -> 在真实生存压力下重新行动 -> 即使无法证明也选择承担。"

  - name: "南宫芸儿"
    layer: "梦境世界"
    narrative_job: "女主与日常情感锚；用自己的判断、记忆和边界承接温良遗失的童年，而不是充当异常调查工具。"
    core_traits: ["聪明", "倔强", "敏感", "安静", "先确认事实再下判断"]
    independent_stake: "维护自己的学业、尊严与对重要关系的判断，不因温良的异常叙述放弃现实生活。"
    history: "童年曾被温良外婆收留，与温良一起长大；她记得的共同生活多于逐渐遗忘的温良。"
    knowledge_boundary: "前期只看见温良虚弱、遗忘和行为变化；没有证据时不会知道双界真相。"

  - name: "古晓雨"
    layer: "梦境世界"
    narrative_job: "作为南宫芸儿的舍友和最亲近的闺蜜，维持校园日常的活力，并主动制造温良与南宫芸儿相处的自然机会。"
    core_traits: ["古灵精怪", "乐天", "反应快", "会看气氛", "不把沉重话题说成大道理"]
    public_goal: "让自己的校园生活有趣、热闹，也让重要朋友不要错过彼此。"
    independent_stake: "即使南宫芸儿和温良不在场，她也有自己的生活判断和需要保护的东西；具体内容暂不公开。"
    relationship_boundary: "她是撮合者但不是操盘者；只能提供机会和玩笑，不能代替男女主表白、选择或解决矛盾。"
    presence_rule: "校园公共场景通常与南宫芸儿一起出现，但允许她单独行动，避免沦为固定跟班。"
    hidden_layer:
      status: "author_only_long_term_secret"
      current_truth: "她另有隐情，人物并不简单；具体身份、动机、知识和后续作用尚未决定。"
      reader_boundary: "前期不向读者提示‘她不简单’，只呈现可信的乐天、机灵和朋友互动。"
      reveal_rule: "只有后续具体事件提供足够证据后，才能回收她的异常；不得提前使用系统、入梦计划或权限术语解释。"

  - name: "陈安"
    layer: "梦境世界"
    narrative_job: "温良的同桌兼舍友，以日常友情和自身家庭压力检验求助、尊严与承担。"
    core_traits: ["嘴碎爱开玩笑", "不拿别人伤口取乐", "会照顾人", "习惯用轻松掩盖困境"]
    active_goal: "维持学业和日常，尽量不让家庭压力拖累朋友。"
    arc_direction: "用玩笑独自硬扛 -> 承认自己做不到 -> 接受帮助并作出选择 -> 学会真正承担。"
    relationship_boundary: "对姚瑶的喜欢不能变成纠缠、拯救或越过拒绝；关系推进以尊重为前提。"

  - name: "姚瑶"
    layer: "梦境世界"
    narrative_job: "以贫困、优秀、自尊和被针对之间的冲突推动校园现实线，并形成独立的反击成长。"
    core_traits: ["隐忍", "善于观察", "自尊强", "礼貌但边界明确", "不接受施舍"]
    active_goal: "守住学习机会和尊严，查清持续针对自己的压力来源。"
    arc_direction: "独自承受 -> 看清结构性问题 -> 接受平等协作 -> 为自己和同类主动反击。"
    relationship_boundary: "后续与陈安形成一组，但必须由双方选择和事件积累推动。"

  - name: "许宁宁"
    layer: "梦境世界"
    status: "普通NPC舍友；后续确有事件需要时再扩展"
    narrative_job: "作为姚瑶的舍友和闺蜜，承接姚瑶在主角团之外的日常生活与情绪出口。"
    core_traits: ["亲切", "务实", "会听人说话", "不主动抢戏"]
    independent_stake: "先维持自己的学业、宿舍生活和朋友关系；暂不赋予隐藏身份或大线。"
    knowledge_boundary: "只知道姚瑶愿意告诉她的校园与生活问题，不知道双界、入梦计划或作者侧秘密。"

  - name: "陈舟"
    layer: "梦境世界"
    narrative_job: "提供普通学生视角和日常对照，让异常先表现为生活里无法解释的缺口。"
    core_traits: ["普通", "谨慎", "会怀疑但不夸大", "受空床影响却无法解释"]
    current_pressure: "住在隔壁双人间，目前因室友被以生病为由带走而单住。"
    knowledge_boundary: "只知道室友离开和校方表层解释，不知道失踪背后的真实原因。"

  - name: "赵思远"
    layer: "梦境世界"
    status: "暂名；后续填坑前不赋予隐藏身份"
    narrative_job: "作为陈舟空床对应的具体学生，使失踪留下人物重量而不是纯布景。"
    current_known_fact: "表层说法是因病被带走；真实去向和事件职责尚未决定。"

  - name: "陆时年"
    layer: "梦境世界"
    narrative_job: "展示梦境社会中的家族能力、阶层优势和校园权力压力，后续再与主线发生牵连。"
    core_traits_direction: ["自信", "轻佻", "习惯特权", "有真实能力而非只靠家世"]
    current_position: "有能力家族的后代，与温良开局无关系，也不是温良好友。"
    possible_pressure: "可用越界试探、轻佻纠缠或权势施压影响姚瑶，但具体事件尚未锁定。"
    prohibited_old_history: "不保留自幼监视温良、家族参与入梦计划或与温良存在真实友情的旧设定。"
    knowledge_boundary: "可以比普通学生更了解梦境社会的隐秘能力，但不能自动知道入梦计划和作者侧真相。"

  - name: "周成海"
    layer: "梦境世界"
    narrative_job: "以班主任职责维护学校日常秩序，并对温良长期下滑作出现实、克制的成年人反应。"
    core_traits: ["负责", "克制", "不与学生称兄道弟", "要求问题得到回应"]

  - name: "马庆山"
    layer: "梦境世界"
    narrative_job: "守住出租屋这一生活据点，让照顾通过修灯、催租和保留住所等具体行动发生。"
    core_traits: ["嘴硬", "市井", "算账清楚", "不轻易表达善意"]

  - name: "林照"
    layer: "真实世界"
    narrative_job: "作为聚落防守与经验判断者，以审慎而非崇拜回应温良的异常。"
    core_traits: ["沉默", "审慎", "经验主义", "承诺少但会承担"]
    relationship_pressure: "先限制温良行动，再根据温良主动劳动、选择和后果逐步调整信任。"

  - name: "秦婶"
    layer: "真实世界"
    narrative_job: "以物资和生存账本代表聚落现实秩序，让每次接纳都具有可见成本。"
    core_traits: ["强硬", "务实", "护短但不滥情", "先算聚落能否承受"]

  - name: "刘婆婆"
    layer: "真实世界"
    narrative_job: "承担有限医疗经验与旧井私人伤口；帮助温良必须来自她对过去失败的选择。"
    core_traits: ["嘴硬", "手稳", "记仇也记恩", "长期守望"]
    private_pressure: "孙女谷雨失踪使她持续关注旧井，但谷雨真相尚未决定。"

  - name: "小果"
    layer: "真实世界"
    narrative_job: "呈现把末世秩序当作正常生活的孩子视角，以直觉和行动判断温良。"
    core_traits: ["胆大", "好奇", "会笑", "熟悉危险规矩"]

  - name: "梁渡"
    layer: "真实世界"
    narrative_job: "让温良的主动救援产生持续关系后果，并以实际技能交换救命债。"
    core_traits: ["肯干", "直接", "不说漂亮话", "认下的债会还"]

directional_relationships:
  - from: "温良"
    to: "南宫芸儿"
    current_state: "依赖熟悉感，却因记忆缺失和不愿拖累而退缩。"
    action_effect: "他需要决定是否诚实描述无法证明的经历。"
  - from: "南宫芸儿"
    to: "温良"
    current_state: "有深厚童年感情，也坚持用事实判断当下。"
    action_effect: "她会关心和观察，但不会无条件相信或替温良调查异常。"
  - from: "陈安"
    to: "温良"
    current_state: "用玩笑和日常照顾维持友情，同时隐藏自己的困境。"
    action_effect: "温良的变化会迫使他决定是否暴露自己的脆弱。"
  - from: "温良"
    to: "陈安"
    current_state: "把陈安当作仍在身边的朋友，却习惯接受照顾而少问对方处境。"
    action_effect: "温良恢复主动性后必须开始看见并回应陈安的压力。"
  - from: "陈安"
    to: "姚瑶"
    current_state: "单向喜欢，容易产生帮助冲动。"
    action_effect: "必须学习先尊重拒绝，再争取平等合作。"
  - from: "姚瑶"
    to: "陈安"
    current_state: "不会因善意立刻信任，更警惕帮助背后的施舍感。"
    action_effect: "只有陈安持续尊重边界，她才可能逐步调整判断。"
  - from: "南宫芸儿"
    to: "姚瑶"
    current_state: "后续发展为朋友，但必须由共同经历建立。"
    action_effect: "南宫芸儿提供稳定支持，姚瑶仍保有自己的决定权。"
  - from: "古晓雨"
    to: "南宫芸儿"
    current_state: "舍友兼最亲密的闺蜜，日常习惯并肩出现。"
    action_effect: "古晓雨会用玩笑、安排和观察制造机会，但不替南宫芸儿作决定。"
  - from: "南宫芸儿"
    to: "古晓雨"
    current_state: "信任她的活泼和陪伴，把她视为日常生活的一部分。"
    action_effect: "南宫芸儿会接受撮合或提醒，但仍依据自己的判断处理温良和其他关系。"
  - from: "古晓雨"
    to: "温良"
    current_state: "以轻松玩笑和半公开撮合接近，不把他当异常研究对象。"
    action_effect: "她提供相处机会，也可能因自己的隐情在后续改变风险结构。"
  - from: "许宁宁"
    to: "姚瑶"
    current_state: "舍友兼闺蜜，提供日常陪伴和不带施舍感的支持。"
    action_effect: "她能让姚瑶在被针对时拥有主角团之外的选择和退路。"
  - from: "姚瑶"
    to: "许宁宁"
    current_state: "信任但仍保留自尊边界，会接受陪伴而不愿被过度照顾。"
    action_effect: "姚瑶的反击线不能因舍友存在而被代替，许宁宁只承接她愿意分享的部分。"
  - from: "陆时年"
    to: "姚瑶"
    current_state: "可能以家世和能力优势进行越界试探；具体行为未锁定。"
    action_effect: "只用于制造选择和后果，不能把姚瑶降为等待解救的目标。"
  - from: "陆时年"
    to: "温良"
    current_state: "开局无关系、无友情、无监视任务。"
    action_effect: "必须等后续事件真实相交后才建立关系。"
  - from: "聚落"
    to: "温良"
    current_state: "警惕、评估、利益需求和有限同情并存。"
    action_effect: "信任只能由温良的劳动、选择、能力风险和承担逐步改变。"

character_quality_gates:
  - "人物行为必须能追溯到目标、性格、关系、已知信息或现场压力，不能为推进设定突然变聪明或变愚蠢。"
  - "主要人物至少拥有一个不依赖温良的目标和一次有后果的选择。"
  - "任何隐藏世界术语都不能通过人物对白提前讲解；人物只能使用其当前知识层允许的抽象称呼。"
  - "南宫芸儿不是无条件相信者，姚瑶不是被救奖品，陈安不是纯搞笑角色，陆时年不是只为挨打的纸片反派。"
  - "古晓雨不是撮合工具；她的隐情只保留在作者侧，前期不得用可疑旁白或术语暗示。"
  - "许宁宁是普通舍友 NPC，不提前添加隐藏身份、异常知识或大线功能。"
  - "真实世界人物不能整齐划一地崇拜或敌视温良；态度要由各自职责、损失和利益形成。"

inactive_or_removed:
  - "陆时砚：旧名废止，统一为陆时年。"
  - "沈明：暂停使用的旧暂名；陆时年校园压力职责未定案前不得并行写入正文。"

