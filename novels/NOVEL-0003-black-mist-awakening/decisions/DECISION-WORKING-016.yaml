summary: "确认温良能力只在关键节点触发，回返真实世界需要条件和目的；南宫芸儿的聪明倔强安静位、陈安家庭线的集团化压迫结构、姚瑶的隐忍观察型状态，以及真实世界有人管理底层生存。"

confirmed_points:
  - "温良早期能力触发只发生在关键节点，尤其是救人或必须做事的时刻。"
  - "梦境通道返回真实世界需要条件，不是随时可切换。"
  - "温良回真实世界必须以真实需要和目的为前提。"
  - "南宫芸儿聪明、倔强、敏感、安静。"
  - "陈安家庭线更适合集团化成年人压迫结构，并可有小一辈人物前台化。"
  - "姚瑶是先沉默观察、内心抑郁、但不直接拆台的隐忍型角色。"
  - "真实世界后续有人勉强活着，也有人在管理和维护底层秩序。"
  - "底层的人需要工作、上缴、交换资源，生存非常艰难。"
  - "梦境系统曾被强行关闭返回通道，大多数人的灵魂被囚禁在另一层世界里。"
  - "温良因为灵魂强韧和肉身-精神分割历史，才会持续做梦并保留特殊性。"
  - "黑雾开局不应一直有脚步声；早期是持续消耗，后续才进入融合和恢复。"

open_points:
  - "黄金世界的正式称呼。"
  - "陈安家庭线集团势力更偏家族式还是公司式。"
  - "温良最早能力绑定的具体事件类型。"
  - "南宫芸儿最核心的两个到三个性格关键词。"

