summary: "同步本轮作者新增确认：梦境与真实世界严格分离；脚步声只由温良感知；出租屋、宿舍、黑雾、真实界循环和新增女性角色均进入临时工作账本。"

confirmed_points:
  - "梦境中的其他人不应听见脚步等异象。"
  - "真实世界与梦的世界理论上严格分开，温良是中间载体。"
  - "出租屋是温良从记事起一直住的长期住所。"
  - "房租由温良自己承担，现阶段已开始吃力。"
  - "房东是后续需要独立成型的人物。"
  - "温良下一次回出租屋应撞上房东催租。"
  - "宿舍是温良和赵砚的两人间实际居所。"
  - "宿舍里其他人只会看到温良突然昏倒或失去意识。"
  - "真实世界存在黑雾纹路、失去意识和雾中怪物的风险。"
  - "现实劳作、挖矿和神秘组织交换资源的循环成立，但细节待定。"
  - "黑雾主要应留在真实世界。"
  - "半圆加直线图标后置，不应高频早露。"
  - "温良在现实世界只能被动驱雾，在梦中只能有限度影响局部。"
  - "温良的认知推进必须渐进，不能过早悟透。"

