id: DECISION-WORKING-019
owner:
  novel_id: NOVEL-0003
status: working
visibility: internal
canon_effect: proposal_only

summary: "汇总《雾醒时分》当前作者确认的双界、人物、能力、披露与写作边界；本记录是作者侧内部工作真相，不是可直接复制进正文的设定说明。"

decision_precedence:
  - "最新作者明确修正优先于旧 working_decision。"
  - "working_decision 优先于外部整理稿；外部整理稿只作为待核对输入。"
  - "未被作者确认的推演继续保持 proposal，不得冒充 Canon 或正文事实。"

confirmed_points:
  - "作者侧基础起点保留为：原本只有一个世界；约十一年前的入梦计划与黑雾灾变造成梦境层和真实层的长期分离，二者完整因果仍未锁定。"
  - "原称晨曦计划的隐藏设定统一改名为入梦计划；该名称在正式揭晓前不得进入正文。"
  - "温良在计划中的作者侧编号由初号机改为零号；该编号同样属于后期揭晓术语。"
  - "梦境世界承担都市、校园、日常与人际关系质感；真实世界承担末世灾难、生存与探索质感。"
  - "双界时间完全同步，固定为一比一，不再保留时间流速差。"
  - "梦境世界会自动修正常识冲突；未意识到异常的人倾向于忽略，开始意识到异常的人才可能持续看见，并可能遭到压制。"
  - "入梦计划中的人是承担多种未知用途的实验对象，系统并不保证其长期稳定，随时可能出现异常、失踪或其他状况。"
  - "黑雾侵蚀活人后会留下黑色痕迹并逐步夺走意识；侵蚀完成后肉体成为空壳，灵魂化入浓雾。"
  - "正常人可以通过隐秘方法锻炼灵魂并获得抗雾或驱雾能力；温良是天生具备基础状态的人，并非唯一可能者。"
  - "温良可以缓解或治愈尚不严重的黑斑，但不能据此无条件逆转完成侵蚀的人。"
  - "梦境中的影响能力取决于灵魂强度与权限；前期只能产生有限影响，更强操作需要更强灵魂和更高权限。"
  - "传送点不是稳定门户；同一个点在温良使用后会失效或坍塌，不能再次使用，其他往返条件继续保持未知且苛刻。"
  - "温良的肉身作为双界锚点，只在后续需要返回真实世界时逐步体现，不在前期提前解释。"
  - "从真实世界返回梦境世界后无法留下可独立验证的物证、录音、伤痕或数字记录；温良的取证尝试只能得到空结果。"
  - "聚落就叫聚落；以持续燃烧的特殊燃料形成火线，火线是抵抗黑雾和组织巡守的核心。"
  - "南宫芸儿是女主，童年曾被温良外婆收留；姚瑶后续与陈安形成关系线。"
  - "陆时砚改名陆时年；他不是温良好友，前期与温良没有关系，是梦境世界有能力家族的后代。"
  - "第一卷结构和终点暂不锁定，不再把医院醒来设为既定收束。"

genre_contract:
  dream_layer:
    author_label: "梦境世界"
    delivery: "都市校园、普通日常、轻松对白、关系累积与异常慢慢渗入。"
  real_layer:
    author_label: "真实世界"
    delivery: "末世灾难、生存劳动、资源压力、黑雾威胁与未知区域探索。"
  contrast_rule: "两层的感官、行动成本和社会关系必须明显不同，但正文不靠作者解释宣布差异。"

long_term_rules:
  protagonist:
    - "温良早期会猜测噩梦、幻觉、昏迷或穿越，不会直接知道入梦计划、零号、权限或双界体系。"
    - "温良进入聚落后必须主动观察、试探、劳动、选择救人并寻找出路，不能只被他人安排。"
    - "能力增长必须改变选择并产生风险，不能按剧情需要临时解锁免费答案。"
  world:
    - "黑雾主要属于真实世界；梦境世界只能出现跨层影响留下的异常表象。"
    - "普通人对异常的忽略来自世界修正；意识增长会提高感知，也会增加被系统压制的风险。"
    - "任何跨界都必须有具体触发、严重限制和后果；不得日常切换。"
    - "火线、灵魂训练、传送代价和入梦计划用途未确认的细节继续保持未知。"
  writing:
    - "背景设定不得以百科说明、旁白总结、角色讲课或术语堆叠进入正文。"
    - "具体术语只有在剧情内被角色发现、命名或公开后才能使用；在此之前只写现象、误判、行动、压力和代价。"
    - "作者侧标签梦境世界、真实世界、入梦计划、零号、系统、权限、灵魂锚点不得被前期 POV 或普通角色直接说出。"
    - "每个人物只能依据自己已经获得的知识行动，不能调用作者侧真相。"
    - "细节只有在改变人物选择、关系、风险、线索或事件后果时才进入正文。"

surface_visibility:
  readers_should_see_early:
    - "温良的虚弱、脚步声、记忆缺口和无法解释的感受。"
    - "稳定具体的校园、宿舍、出租屋与人际日常。"
    - "普通人对明显异常作出自然化、合理化或忽略反应。"
    - "陈舟身边的空床、姚瑶受到的现实压力、陈安隐藏的家庭困境。"
    - "聚落中的饥饿、劳动、火线、黑雾、黑斑与不同人物的生存选择。"
    - "温良试图保存证据却得到空结果。"
  internal_only_until_reveal:
    - "入梦计划及其真正目的。"
    - "零号身份。"
    - "梦境系统、修正机制、权限层级和实验对象用途。"
    - "灵魂训练的完整方法与传承来源。"
    - "传送点的完整原理、全部代价与肉身锚点。"
    - "两个世界的完整真假答案。"
  term_activation_rule: "先由事件提供可观察证据，再让人物形成工作解释，最后在明确揭晓场景中获得名称；名称启用前不得出现在正文叙述和对白。"

