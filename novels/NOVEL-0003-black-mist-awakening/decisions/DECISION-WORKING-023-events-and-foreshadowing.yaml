schema_version: "0.1.0"
record_type: working_decision
id: DECISION-WORKING-023
owner:
  novel_id: NOVEL-0003
status: working
visibility: internal
canon_effect: proposal_only

summary: "维护双界事件链、人物主动选择、伏笔状态和术语披露顺序；第一卷结构与终点暂不锁定。"

internal_timeline:
  - period: "约十一年前"
    author_only_event: "入梦计划与黑雾灾变造成梦境层和真实层的长期分离；温良作为零号与计划存在特殊关系。"
    disclosure_limit: "只记录在作者侧工作流，正文前期不得使用计划名、零号或完整因果。"
  - period: "此后十年左右"
    author_only_event: "温良长期受到跨层异常影响，从优秀受瞩目逐渐变得虚弱、疲惫和被忽视。"
    disclosure_limit: "正文通过成绩、体力、记忆和关系变化呈现，不用设定解释概括。"

event_chain:
  - phase: "校园日常与脚步声"
    desire: "温良想维持普通生活并隐藏自己的衰弱。"
    resistance: "虚弱、记忆缺口和只有他能感知的脚步声不断破坏日常。"
    change: "他开始怀疑自己经历的不只是普通噩梦，但仍以幻觉、穿越或昏迷解释。"
    hook: "脚步声逼近，梦中空间出现不能用常识解释的出口。"
    disclosure_limit: "不使用入梦计划、零号、梦境世界或真实世界等深层称呼。"
  - phase: "追入雾中与肉身融合"
    desire: "温良想确认脚步声来源并停止被追逐。"
    resistance: "黑雾遮蔽、方向不稳、身体和意识状态互相错位。"
    change: "他遇到自己的肉身并完成融合，进入真实世界的肉体生存状态。"
    hook: "疼痛、饥渴、黑雾和废墟迫使他立即行动，而不是解释。"
  - phase: "聚落初到"
    desire: "温良想活下来、确认这里的规则并决定是否寻找回去的方法。"
    resistance: "聚落不信任外来者，食物和火线劳动都有限，黑雾随时逼近。"
    change: "他主动观察、选择劳动、测试自己能做什么，并用行动争取最低限度的容身资格。"
    hook: "他发现自己的驱雾状态会改变聚落的风险判断，也会招来新的注意。"
  - phase: "火线与救援"
    desire: "温良想验证能力并保护自己能承担的对象，而不是等待别人定义他。"
    resistance: "火线燃料不足、巡守疲劳、雾压变化和聚落对暴露能力的恐惧。"
    change: "他在自己判断的时刻救下梁渡或其他明确对象，承担能力暴露和关系后果。"
    hook: "救人没有让聚落统一接纳他，反而让各方重新计算他的价值和危险。"
  - phase: "灵魂训练与旧井调查"
    desire: "温良主动寻找能理解黑雾、改善自身状态或返回另一边的路径。"
    resistance: "训练方法隐秘且代价未知，旧井不是稳定门户，知情者各有隐瞒。"
    change: "他通过观察、交换、试错和选择逐步获得不完整的工作模型。"
    hook: "旧井提供一次机会，但使用后会失效，且失败后果无法提前计算。"
  - phase: "单点返程"
    desire: "温良为了明确的人或不可替代的目的选择返程。"
    resistance: "触发条件苛刻、通道危险、同一点不可再次使用，可能失去回头路。"
    change: "他回到梦境层，但只能带回主观记忆和行为变化，不能带回任何可验证证据。"
    hook: "梦境日常继续运作，只有温良知道自己已经失去了一条真实可走的路。"
  - phase: "梦境回归后的取证失败"
    desire: "温良想证明自己没有疯、没有做普通的梦，并确认真实经历有意义。"
    resistance: "物品、数字、录音和身体印记都无法成为独立证据；世界修正会让他人自然化异常。"
    change: "他必须从追求证明转向根据无法证明的经历作选择。"
    hook: "某次选择让他意识到，真正的代价不是别人不信，而是他仍然必须独自承担。"

foreshadowing:
  - key: "FORESH-FOOTSTEPS"
    surface: "脚步声只被温良听见，逐步逼近。"
    current_model: "噩梦、幻觉、错位或精神问题。"
    later_reveal: "来自另一个层面的真实影响；具体称呼在正式揭晓事件后启用。"
  - key: "FORESH-CORRECTION"
    surface: "明显异常被周围人用健康、疲劳、巧合或普通手续解释。"
    current_model: "人情冷漠、记忆错误或温良过度敏感。"
    later_reveal: "世界会修正常识冲突；只有逐渐意识到异常的人才能持续看见。"
  - key: "FORESH-NO-DREAM"
    surface: "所有人都把不做梦视为正常，少数异常者被带走或被合理化。"
    current_model: "校园和医疗系统的普通规则。"
    later_reveal: "公开解释是抽象的脑波调节，深层原因是系统主动关闭梦境能力。"
  - key: "FORESH-EMPTY-BED"
    surface: "陈舟室友赵思远因病被带走，空床长期保留。"
    current_model: "普通疾病和学校管理。"
    later_reveal: "去向、实验对象异常和梦境社会失踪机制暂不锁定。"
  - key: "FORESH-FIRELINE"
    surface: "燃料变少时黑雾逼近，火势恢复时雾退开。"
    current_model: "聚落最基本的生存常识。"
    later_reveal: "火线、灵魂训练和驱雾能力之间的关系逐步显现。"
  - key: "FORESH-WENLIANG-MIST"
    surface: "温良身边的雾退得更快，他能缓解轻度黑斑。"
    current_model: "异常体质或偶然。"
    later_reveal: "灵魂强度、训练方法和零号身份的后期关系。"
  - key: "FORESH-OLD-WELL"
    surface: "旧井被聚落避讳，知情者只讲不完整的规则和代价。"
    current_model: "危险废墟或幸存者迷信。"
    later_reveal: "它是一次性高风险通道；同一点不能重复使用。"
  - key: "FORESH-LU-SHI-NIAN"
    status: "候选工作方向；具体校园事件未锁定"
    surface: "陆时年以家族优势和能力在校园中越界试探姚瑶。"
    current_model: "普通的权势压迫和同学冲突。"
    later_reveal: "他的家族、能力与梦境社会结构可能牵动主线；不预设其与入梦计划有关。"
  - key: "FORESH-GRAY-CLAD"
    status: "保留的工作提案；出场节点未锁定"
    surface: "聚落对一批能够跨聚落交易的灰衣来客保持明显戒备。"
    current_model: "掌握稀缺药品、工具、燃料或消息的外部势力。"
    later_reveal: "他们可能在收集异常梦境、返程者或双界线索；组织目的和与入梦计划的关系继续保持未知。"
  - key: "FORESH-NANGONG-MEMORY"
    surface: "南宫芸儿记得温良忘掉的童年，外婆收留线以生活片段出现。"
    current_model: "两人曾经亲近但温良记性变差。"
    later_reveal: "记忆缺失与温良经历的关系，以及两人是否能在无法证明的现实上继续选择。"
  - key: "FORESH-GU-XIAOYU"
    status: "作者侧长期伏笔；具体回收事件未锁定"
    surface: "古晓雨作为南宫芸儿的舍友和闺蜜，古灵精怪、乐天，频繁自然地制造温良与南宫芸儿相处机会。"
    current_model: "一个热心、会看气氛、喜欢撮合朋友的普通校园女生。"
    hidden_direction: "她另有隐情，真实动机、知识和后续作用不简单，但不需要前期读者知道。"
    reveal_rule: "前期不得用异常凝视、作者旁白、系统术语或过度神秘化动作提示答案；必须等具体事件提供可回收证据。"

disclosure_stages:
  - stage: "表层"
    allowed: "校园日常、黑雾压迫、脚步声、失踪、火线、劳动、人物误判。"
    forbidden: "作者侧计划名、编号、系统名、双界分类和完整能力解释。"
  - stage: "意识形成"
    allowed: "温良和少数角色承认异常存在，形成不完整工作模型。"
    forbidden: "把工作模型写成客观世界真相。"
  - stage: "命名揭晓"
    allowed: "在具体事件中由有权限角色或证据正式命名一个术语。"
    requirement: "术语只能解释当前选择需要的部分，不能回溯性讲完百科。"
  - stage: "深层公开"
    allowed: "入梦计划、零号、系统、权限和传送原理在对应揭晓节点后使用。"
    requirement: "每次公开必须改变人物关系、选择、风险或读者对旧事件的理解。"

event_quality_gates:
  - "每个事件必须有明确欲望、阻力、变化和后续拉力。"
  - "温良的关键行动必须来自他当时的知识和性格，不由他人替他完成核心选择。"
  - "伏笔先提供可观察现象，再提供局部解释，最后通过事件回收；不能先给答案再补神秘感。"
  - "医院不是已锁定的卷末；任何卷结构调整必须另走 novel-outline。"
  - "真实经历不能靠录音、手机、红印、灯光或物品在梦境留下客观证据。"

obsolete_from_previous_revision:
  - "医院醒来作为第一卷既定收束：撤销，卷结构和终点未锁定。"
  - "手机录音、手腕红印、灯光闪烁作为跨界证据：撤销。"
  - "半圆竖线图标作为当前固定伏笔：暂停，除非后续事件需要并获得作者确认。"

