  author_selection_rationale: ""

character_workspace:
  protagonist_candidates:
    - temporary_name: 温良
      role: protagonist
      external_want: "回到梦境，找到并拯救重要的人，恢复被夺走的正常生活"
      internal_need: "接受自己不是被动受害者，而是能主动选择、承担代价的人"
      wound: "十年持续做梦带来的虚弱、失去感和自我放弃"
      lie: "自己已经普通、没家、没资格再去争取什么"
      values:
