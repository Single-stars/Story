inspiration:
  raw_notes: "温良原本优秀，因十年间持续梦境逐渐虚弱；最后一次梦中与真实界肉身融合后留在真实界；梦里强烈情绪会让下意识反应成真；真实界黑雾、火光聚落、普通幸存者、后来才显现的组织；女主南宫芸儿与温良有共同童年但温良遗忘；想要轻松一点的第三人称校园开篇，逐步收拢到真实界冒险，最后回到梦境并在医院醒来。"
  must_keep_elements:
    images:
      - 黑雾
      - 脚步声
      - 火光聚落
      - 医院醒来
    emotions:
      - 轻松日常
      - 不安与悬疑
      - 失而复得的牵引
    scenes:
      - 校园碎片化日常
      - 梦境间断出现异常
      - 真实界黑雾中看到火光
      - 警惕接触聚落居民
      - 回到梦境后在医院醒来
    lines_or_titles:
      - "世人沉睡于美梦，唯我独醒于人间"
    character_seeds:
      - 温良
      - 南宫芸儿
    world_seeds:
      - 双界重叠
      - 黑雾梦境
      - 真实界废墟与原始地形
      - 权限体系
  unknowns:
    - question: "温良的权限成长到底是怎样从无到有、再从弱到强的"
      why_it_matters: "决定能力体系是否稳定、是否有趣、是否能支撑长期剧情"
    - question: "真实界普通聚落居民与后期组织之间的衔接方式"
      why_it_matters: "决定第一卷后半段信息披露与主线推进的可信度"

