world_workspace:
  setting_summary: "双界重叠共存：现代校园的梦境世界与被黑雾覆盖、废墟化的真实界并行；梦境前期只以黑雾、脚步声和小异常间断渗出。"
  rules:
    - rule: "梦境具有意识影响现实的倾向"
      scope: "梦境侧"
      limitation: "温良开局没有稳定权限，强烈情绪只会产生不稳定、局部、代价高的反应"
      cost: "精神与体力波动，且未必可控"
      exception: "后期权限成长后可在有限边界内更稳定地调用"
      story_use: "制造钩子与误判，给成长和试探留下空间"
    - rule: "真实界能力与梦境权限分开"
      scope: "真实界侧"
      limitation: "驱雾、显形、稳定空间、连接真实信息等能力只能逐步形成，不能一开始全开"
      cost: "与灵魂强度、认知负担和现实稳定性有关"
      exception: "后续待定"
      story_use: "把能力写成规则和权限，不写成硬砸输出"
    - rule: "黑雾不是装饰，而是世界遮蔽层"
      scope: "双界"
      limitation: "不能直接一次性驱散全部真相"
      cost: "驱散、显形和连接信息都会暴露代价"
      exception: "待后续 proposal"
      story_use: "作为压迫、探索和真相揭示的统一媒介"
  institutions: []
  resources_and_constraints:
    - "真实界火光聚落只知道生存，不知道完整真相"
    - "后期组织与更高权限层才会显现"
  research_questions:
    - question: "章节节奏与每章字数如何更贴近中文网文阅读习惯"
      impact_if_wrong: "会影响留存、钩子和长篇推进效率"
      priority: medium

