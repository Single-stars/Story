      voice_fingerprint:
        diction: "偏日常、简短、带一点自嘲和麻木感"
        syntax: "以贴近第三人称的自然描述为主，少做说教式解释"
        perception_filter: "先观察异常，再判断异常是否值得相信"
        avoided_topics:
