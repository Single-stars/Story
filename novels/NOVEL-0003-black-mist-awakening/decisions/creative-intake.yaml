      hidden_truth: "两人共同被同一人抚养过，温良遗忘了大部分"
      tension: "她先不信他关于真实界的说法，后来逐步相信；他一开始相信，后续又在正常生活里怀疑自己"
      expected_arc: "误解 -> 观察 -> 相信 -> 一起寻找真相"
  secrets_and_knowledge:
