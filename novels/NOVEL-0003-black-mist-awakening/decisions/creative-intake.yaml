    - "当真实世界比梦更像噩梦时，人到底该相信哪一层"
  core_conflict_options:
    - "温良想回梦境拯救重要的人，但真实界正在逼他接受新的生存法则"
  logline_candidates:
    - id: PREMISE-A
      status: proposed
      logline: "高三生温良十年间被黑雾梦境削弱，直到灵魂与真实界肉身融合后被迫留在荒芜的地球；他要先活下去，再想办法回到梦境拯救重要之人，而每一次情绪波动都可能让梦境倾向于把想象变成现实。"
      strengths:
