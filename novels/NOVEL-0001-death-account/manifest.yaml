premise:
  status: proposed
  logline: 当城市全部可信记录都证明她昨夜已经死亡，保险死亡核验师许见微必须在被当成冒名者抓捕前，证明活着的自己不是伪造品，并找出三年前已死的妹妹为何仍在使用她的身份。
  theme_question: 可信证据与真实之间，是否永远需要一道允许人提出异议的缝隙？
  core_conflict: 许见微越想依靠完整证据链恢复身份，越发现证据链的身份归属层已被污染；她必须在证明自己、追查妹妹和公开亲人过错之间作出选择。
