<!doctype html>
<html lang="zh-CN" data-theme="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f5f2" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Story OS 的移动端私密小说阅读器。" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <title>Story OS 阅读器</title>
  </head>
  <body>
    <a class="skip-link" href="#main-content">跳到正文</a>
    <main id="main-content" tabindex="-1">
      <section class="loading-state" aria-live="polite" aria-busy="true">
        <img class="boot-mark" src="./icon-192.png" alt="" width="64" height="64" />
        <p>正在打开书架...</p>
      </section>
    </main>
    <div id="announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <noscript>此阅读器需要启用 JavaScript 才能加载已授权的书籍。</noscript>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
