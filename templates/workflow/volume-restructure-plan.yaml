# Copy this file into reports/restructure/ before rebuilding a volume or chapter range.
schema_version: "0.1.0"
id: RESTRUCT-0001
record_type: volume_restructure_plan
owner:
  novel_id: NOVEL-0001
status: planned
visibility: internal
canon_effect: proposal_only

scope:
  novel_id: NOVEL-0001
  volume: 1
  from: "story opening"
  to: "the protagonist reaches the next irreversible turn"
  replaces_chapter_ids:
    - CHAPTER-0001

source_constraints:
  world_layers:
    - "Each active world, timeline, or social layer must have distinct visible texture."
    - "Layer changes must be signaled by environment, character behavior, cost, or rule pressure."
  capability_timeline:
    - "Before fusion: no object control or physical reality rewriting."
    - "After a threshold change: only explicitly approved effects may appear."
    - "Special-rule spaces may permit limited effects only when the scene contract says so."
  reader_exposure:
    - "Early chapters may show low-level traces and survival routines, not high-level organization truth."
    - "Reader-visible clues must be fair signals, not internal answers."
  relationship_pacing:
    - "Main relationship develops slowly through ordinary school contact, disagreement, and earned trust."
  motivation_and_concept_gates:
    - "Ability tests require a trigger, immediate goal, hypothesis, risk, and stopping condition."
    - "New concepts begin as visible phenomena and consequences; labels cannot reveal function or truth."
    - "NPCs must have independent goals, knowledge limits, and costs before supplying routes or answers."
    - "Cross-world transitions must track people, items, injuries, and elapsed time without silent duplication."

phase_plan:
  - phase_id: P1-opening-pressure-and-social-texture
    chapter_slots:
      - CHAPTER-0001
    world_layer: "primary layer and contrasting daily texture"
    function: "Establish the protagonist's recurring pressure and ordinary social context."
    entry_pressure: "The protagonist enters the day carrying a private disturbance but must still act normally."
    decisive_change: "The disturbance leaves a concrete trace in attention, memory, relationship, or choice."
    exit_hook: "A repeated signal becomes a question the protagonist cannot dismiss."
    required_cast:
      - "protagonist"
      - "slow-burn heroine"
      - "named roommate or classmate"
    foreshadowing:
      - "footsteps"
      - "memory gap"

character_roster_policy:
  - "Any dialogue or recurring function needs a name, first-look detail, simple personality signal, and relationship position."
  - "Minor cast must change pressure, reveal social texture, or create choice; otherwise merge or delete."

memory_contract:
  must_load_ids:
    - STYLE-0001
  must_update_after_draft:
    - "chapter workpack"
    - "scene contracts"
    - "character roster proposals"
    - "foreshadowing ledger proposals"
  forbidden_shortcuts:
    - "Do not map old chapter numbers directly to new chapters without checking function."
    - "Do not use chat memory as the only source for ability timing or reader exposure."
    - "Do not solve missing motivation with narrator explanation."

quality_gates:
  world_layers_separated: true
  capability_timeline_locked: true
  reader_exposure_limited: true
  character_roster_policy_declared: true
  relationship_pacing_declared: true
  phase_causality_declared: true
  prose_profile_linked: true

resume_brief: >-
  Load this restructure plan before rebuilding the chapter range. It is a
  proposal matrix, not Canon and not final prose. Each phase must later become
  chapter workpacks and scene contracts before drafting.
