# Story OS chapter workpack template.
# Copy this file into reports/workpacks/ before drafting or continuing one chapter.
schema_version: "0.1.0"
id: CHRUN-0001
record_type: chapter_workpack
owner:
  novel_id: NOVEL-0001
status: planned # planned | in_progress | draft_ready | reviewed | accepted | blocked | stale
visibility: internal
canon_effect: proposal_only

chapter_id: CHAPTER-0001
target_word_count:
  min: 3000
  target: 3500
  max: 4200

# These scenes are the only approved structural source for the chapter draft.
scene_ids:
  - SCN-0001

# Load these records before writing. Do not rely on chat memory.
required_context:
  style_profile_ids:
    - STYLE-0001
  canon_ids:
    - CHAR-0001
    - LOC-0001
    - RULE-0001
  narrative_ids:
    - SCN-0001
    - THREAD-0001
    - FORESH-0001
  manuscript_chapter_ids:
    - CHAPTER-0000
  decision_ids:
    - DEC-0001

# Reviews that must be satisfied before this workpack can be treated as reviewed
# or accepted. Review records are audit/proposal evidence, not Canon approval.
# Keep arrays empty while the chapter is still being planned.
required_reviews:
  continuity:
    required: true
    review_ids: []
    notes: "Continuity review must cover this chapter before reviewed/accepted status."
  developmental_edit:
    required: true
    review_ids: []
    notes: "Structure and chapter-function review must cover this chapter before reviewed/accepted status."
  reader_test:
    required: true
    review_ids: []
    notes: "Fresh-reader test must use only authorized manuscript scope; it must not read hidden Canon."
  line_edit:
    required: true
    review_ids: []
    notes: "Line edit review must cover clarity, repetition, AI residue, POV distance, action logic, and prose fidelity before reviewed/accepted status."

continuity_contract:
  world_state: >-
    Name the current world and visible condition before drafting: dream world,
    real/main world, memory, flashback, rumor, or unreliable narration.
  capability_scope: >-
    List what the POV may and may not do in this world and phase. A chapter may
    not invent or carry abilities across worlds without an approved rule change.
  character_knowledge: >-
    List what each active character knows, suspects, wrongly believes, and must
    not know yet. Do not use author knowledge as character knowledge.
  relationship_state: >-
    Name the current relationship direction and the event that justifies any
    change in trust, affection, fear, obligation, or leverage.
  foreshadowing_plan: >-
    State which foreshadowing is planted, advanced, paid off, or withheld. The
    reader-visible clue must not reveal the hidden answer too early.
  motivation_gate: >-
    Before any ability test, record trigger, immediate goal, hypothesis, risk,
    and stopping condition. Without all five, do not test or narrate a capability checklist.
  concept_exposure_gate: >-
    New concepts begin as visible phenomenon, material trace, use, or reaction.
    Names must have a source and cannot reveal function, purpose, or hidden truth.
  npc_independence_gate: >-
    An NPC who supplies information, access, protection, or a route must have an
    independent goal and a cost; do not make dialogue announce the NPC's role.
  cross_layer_state_gate: >-
    Track people, items, bodies, injuries, and elapsed time across every world or
    dream transition. No silent duplication or transfer.
  reader_exposure:
    allowed:
      - The reader may see only facts earned by the approved scenes.
    forbidden:
      - Do not reveal future truth, hidden organization-level explanations, or unearned rule answers.

quality_gates:
  word_count_defined: true
  scene_contracts_locked: true
  capability_scope_checked: true
  character_roster_named: true
  relationship_changes_motivated: true
  plot_causality_checked: true
  foreshadowing_status_checked: true
  reader_exposure_limited: true
  prose_quality_review_planned: true
  motivation_gate_checked: true
  concept_exposure_checked: true
  npc_independence_checked: true
  cross_layer_state_checked: true

resume_brief: >-
  One paragraph that lets a new agent resume the chapter without reading the
  whole chat: current chapter purpose, entry pressure, approved scenes, key
  rules, forbidden spoilers, target word range, and exact stop point.
